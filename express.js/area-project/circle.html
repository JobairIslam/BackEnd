<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f8;
        }

        .container {
            width: 360px;
            background: #ffffff;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 18px;
            font-size: 26px;
            color: #1f2937;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        label {
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        button {
            border: none;
            background: #2563eb;
            color: #ffffff;
            padding: 11px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Circle Calculator</h1>
        <form action="/circle" method="POST">
            <div>
                <label for="radius">Radius</label>
                <input id="radius" name="radius" type="number" min="0" step="any" placeholder="Enter circle radius" required>
            </div>
            <button  type="submit">Calculate</button>
        </form>
        <a class="back-link" href="/">Back to home</a>
    </div>
</body>
</html>
